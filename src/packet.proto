syntax = "proto3";
package Protocol;

message C_CheckIdRequest {
  string username = 1;
}

message S_CheckIdResponse {
  string username = 1;
  bool is_duplicated = 2;
}

message C_Email {
  string email = 1;
}

message C_VerilyEmail {
  string email = 1;
  int64 VerilyNum = 2;
}

message S_EmailResponse {
  bool isVerily = 1;
}

message C_MakeAccount {
  string username = 1;
  string password = 2;
  string email = 3;
}

message S_Login {
  string username = 1;
  string password = 2;
}

message PacketWrapper {
  oneof payload {
    S_CheckIdResponse check_id_res = 1;
    C_CheckIdRequest check_id_req = 2;
    C_Email email_res = 3;
    C_VerilyEmail email_res2 = 4;
    S_EmailResponse email_req = 5;
    C_MakeAccount makeaccount = 6;
    S_Login login = 7;
  }
}